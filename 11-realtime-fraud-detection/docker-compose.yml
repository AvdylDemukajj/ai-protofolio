version: '3.9'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fraud-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - fraud-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fraud-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - fraud-network

  redis:
    image: redis:7-alpine
    container_name: fraud-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_/data
    networks:
      - fraud-network

  db:
    image: postgres:15-alpine
    container_name: fraud-db
    environment:
      POSTGRES_USER: fraud_user
      POSTGRES_PASSWORD: SecurePass123!
      POSTGRES_DB: fraud_db
    volumes:
      - postgres_/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - fraud-network

  # Generates fake traffic for demo
  generator:
    build:
      context: .
      dockerfile: Dockerfile.generator
    container_name: fraud-generator
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - fraud-network

  # Core Fraud Detection Engine
  processor:
    build:
      context: .
      dockerfile: Dockerfile.processor
    container_name: fraud-processor
    depends_on:
      - kafka
      - redis
      - db
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
      DB_URL: postgresql://fraud_user:SecurePass123!@db:5432/fraud_db
      MODEL_PATH: /app/models/fraud_model.pkl
    networks:
      - fraud-network

  # API for manual review and dashboard
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: fraud-api
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      DB_URL: postgresql://fraud_user:SecurePass123!@db:5432/fraud_db
      REDIS_HOST: redis
    networks:
      - fraud-network

volumes:
  redis_data:
  postgres_data:

networks:
  fraud-network:
    driver: bridge