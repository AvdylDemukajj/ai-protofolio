version: '3.9'

services:
  mlflow-db:
    image: postgres:15-alpine
    container_name: mlflow-postgres
    environment:
      - POSTGRES_USER=mlflow
      - POSTGRES_PASSWORD=SecurePass123!
      - POSTGRES_DB=mlflow_db
    volumes:
      - mlflow_pg_/var/lib/postgresql/data
    networks:
      - mlops-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow-server:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow-server
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_HOST=0.0.0.0
      - MLFLOW_PORT=5000
      - BACKEND_STORE_URI=postgresql://mlflow:SecurePass123!@mlflow-db/mlflow_db
      - DEFAULT_ARTIFACT_ROOT=/opt/mlflow/artifacts
    volumes:
      - mlflow_artifacts:/opt/mlflow/artifacts
    depends_on:
      mlflow-db:
        condition: service_healthy
    networks:
      - mlops-network
    command: mlflow server

  pipeline-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pipeline-runner
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow-server:5000
      - ENVIRONMENT=production
    depends_on:
      - mlflow-server
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    networks:
      - mlops-network
    # Run the full pipeline on start (or override with command)
    command: python -m pipeline.trainer

volumes:
  mlflow_pg_data:
  mlflow_artifacts: {}

networks:
  mlops-network:
    driver: bridge