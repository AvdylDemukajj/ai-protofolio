version: '3.9'

services:
  mlflow-db:
    image: postgres:15-alpine
    container_name: mlflow-postgres
    environment:
      - POSTGRES_USER=mlflow
      - POSTGRES_PASSWORD=SecurePass123!
      - POSTGRES_DB=mlflow_db
    volumes:
      - mlflow_pg_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - mlops-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow-server:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: mlflow-server
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://mlflow:SecurePass123!@mlflow-db:5432/mlflow_db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      mlflow-db:
        condition: service_healthy
    networks:
      - mlops-network
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://mlflow:SecurePass123!@mlflow-db:5432/mlflow_db
      --default-artifact-root /mlflow/artifacts

  pipeline-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pipeline-runner
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow-server:5000
      - MIN_ACCURACY_THRESHOLD=0.5
      - ENVIRONMENT=production
    depends_on:
      - mlflow-server
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    networks:
      - mlops-network
    command: python -m pipeline.trainer

volumes:
  mlflow_pg_data:
  mlflow_artifacts:

networks:
  mlops-network:
    driver: bridge
