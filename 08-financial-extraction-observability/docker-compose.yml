version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: financial-api
    restart: unless-stopped
    ports:
      - "8007:8000"
    environment:
      - REDIS_HOST=redis
      - DB_URL=postgresql://fin_user:SecurePass123!@db:5432/fin_db
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadminpassword
    depends_on:
      - redis
      - db
      - minio
    networks:
      - fin-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: financial-worker
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - DB_URL=postgresql://fin_user:SecurePass123!@db:5432/fin_db
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadminpassword
      - MAX_RETRIES=3
    depends_on:
      - redis
      - db
      - minio
    networks:
      - fin-network

  redis:
    image: redis:7-alpine
    container_name: fin-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - fin-network

  minio:
    image: minio/minio:latest
    container_name: fin-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadminpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - fin-network

  db:
    image: postgres:15-alpine
    container_name: fin-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=fin_user
      - POSTGRES_PASSWORD=SecurePass123!
      - POSTGRES_DB=fin_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fin-network

  prometheus:
    image: prom/prometheus:latest
    container_name: fin-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - fin-network

  grafana:
    image: grafana/grafana:latest
    container_name: fin-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/dashboard.json
    depends_on:
      - prometheus
    networks:
      - fin-network

volumes:
  redis_data:
  minio_data:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  fin-network:
    driver: bridge
