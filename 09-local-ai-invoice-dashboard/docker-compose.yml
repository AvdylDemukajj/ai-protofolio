version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: invoice-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://invoice_user:SecurePass123!@db:5432/invoice_db
      - OLLAMA_HOST=http://ollama:11434
      - USE_LOCAL_LLM=true
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
    depends_on:
      db:
        condition: service_healthy
      # ollama: condition: service_started (Optional if using local LLM)
    volumes:
      - uploaded_files:/app/uploads
    networks:
      - invoice-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: invoice-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - invoice-network

  db:
    image: postgres:15-alpine
    container_name: invoice-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=invoice_user
      - POSTGRES_PASSWORD=SecurePass123!
      - POSTGRES_DB=invoice_db
    volumes:
      - postgres_/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoice_user -d invoice_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - invoice-network

  # Optional: Local LLM Service (Requires GPU or significant RAM)
  # Comment out if using cloud LLM fallback
  ollama:
    image: ollama/ollama:latest
    container_name: invoice-ollama
    restart: unless-stopped
    volumes:
      - ollama_/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - invoice-network
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  postgres_data:
  uploaded_files:
  ollama_data:

networks:
  invoice-network:
    driver: bridge