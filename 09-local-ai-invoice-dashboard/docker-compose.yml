version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: local-invoice-backend
    restart: unless-stopped
    ports:
      - "8008:8000"
    environment:
      - DATABASE_URL=postgresql://invoice_user:SecurePass123!@db:5432/invoice_db
      - OLLAMA_HOST=http://ollama:11434
      - USE_LOCAL_LLM=true
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - UPLOAD_DIR=/app/uploads
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./uploads:/app/uploads
    networks:
      - invoice-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: local-invoice-dashboard
    restart: unless-stopped
    ports:
      - "8504:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - invoice-network

  db:
    image: postgres:15-alpine
    container_name: local-invoice-db
    restart: unless-stopped
    ports:
      - "5438:5432"
    environment:
      - POSTGRES_USER=invoice_user
      - POSTGRES_PASSWORD=SecurePass123!
      - POSTGRES_DB=invoice_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoice_user -d invoice_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - invoice-network

  ollama:
    image: ollama/ollama:latest
    container_name: local-invoice-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - invoice-network

volumes:
  postgres_data:
  ollama_data:

networks:
  invoice-network:
    driver: bridge
