version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: n8n-leads-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=leads_user
      - POSTGRES_PASSWORD=${DB_PASSWORD:-SecureDbPass456!}
      - POSTGRES_DB=leads_db
    volumes:
      - postgres_/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5433:5432" # Port 5433 për të mos u përplasur me Projektin 1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leads_user -d leads_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - leads-network

volumes:
  postgres_data: {}

networks:
  leads-network:
    driver: bridge