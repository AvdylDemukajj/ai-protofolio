version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: saas-master-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=saas_admin
      - POSTGRES_PASSWORD=SecureRootPass123!
      - POSTGRES_DB=master_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init_tenant.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas_admin -d master_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - saas-network

  redis:
    image: redis:7-alpine
    container_name: saas-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    networks:
      - saas-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas-api
    restart: unless-stopped
    ports:
      - "8014:8000"
    environment:
      - MASTER_DB_URL=postgresql://saas_admin:SecureRootPass123!@db:5432/master_db
      - REDIS_HOST=redis
      - JWT_SECRET=super_secret_jwt_key_change_in_prod_32chars!
      - ENVIRONMENT=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - saas-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:

networks:
  saas-network:
    driver: bridge
