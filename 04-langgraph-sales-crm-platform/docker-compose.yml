version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sales-agent-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://sales_user:SecurePass123!@db:5432/sales_db
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-dummy-key-for-demo}
      - ENVIRONMENT=development
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sales-network
    command: uvicorn backend.main:app --host 0.0.0.0 --reload

  db:
    image: postgres:15-alpine
    container_name: sales-crm-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=sales_user
      - POSTGRES_PASSWORD=SecurePass123!
      - POSTGRES_DB=sales_db
    volumes:
      - postgres_/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales_user -d sales_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sales-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sales-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://api:8000
    depends_on:
      - api
    networks:
      - sales-network

volumes:
  postgres_data: {}

networks:
  sales-network:
    driver: bridge