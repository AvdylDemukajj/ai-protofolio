version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: invoice-backend
    restart: unless-stopped
    ports:
      - "8006:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://invoice_user:SecurePass123!@db:5432/invoice_db
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - UPLOAD_DIR=/app/uploads
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - invoice-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: invoice-dashboard
    restart: unless-stopped
    ports:
      - "8503:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - invoice-network

  db:
    image: postgres:15-alpine
    container_name: invoice-db
    restart: unless-stopped
    ports:
      - "5437:5432"
    environment:
      - POSTGRES_USER=invoice_user
      - POSTGRES_PASSWORD=SecurePass123!
      - POSTGRES_DB=invoice_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoice_user -d invoice_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - invoice-network

volumes:
  postgres_data: {}

networks:
  invoice-network:
    driver: bridge
